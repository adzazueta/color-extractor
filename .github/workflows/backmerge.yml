name: Backmerge

on:
  push:
    branches:
      - main

concurrency: backmerge-main

permissions:
  contents: read
  pull-requests: write

jobs:
  backmerge:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create PR to develop
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          git fetch origin main develop
          if git merge-base --is-ancestor origin/main origin/develop; then
            echo "main is already ancestor of develop — no sync needed"
            exit 0
          fi
          if gh pr list --base develop --head main --state open --json number --jq 'length > 0' | grep -qx true; then
            echo "PR already exists"
            exit 0
          fi
          gh pr create \
            --base develop \
            --head main \
            --title "chore: sync release version back to develop" \
            --body "Synchronizes the published version, changelog, generated files, and consumed changesets from main."
