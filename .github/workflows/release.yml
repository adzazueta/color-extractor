name: Release

on:
  push:
    branches:
      - main
      - 'release/**'

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: changesets/action@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          version: pnpm release:version
          publish: pnpm release
          branch: ${{ github.ref_name }}
          createGithubReleases: true
          pushGitTags: true
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create PR to develop
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git fetch origin main develop
          if git merge-base --is-ancestor origin/main origin/develop; then
            echo "main is already ancestor of develop — no sync needed"
            exit 0
          fi
          if gh pr list --base develop --head main --state open --json number --jq 'length > 0' | grep -qx true; then
            echo "PR already exists"
            exit 0
          fi
          gh pr create \
            --base develop \
            --head main \
            --title "chore: sync release version back to develop" \
            --body "Synchronizes the published version, changelog, generated version, and consumed changesets from main."
